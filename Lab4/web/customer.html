<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header-title {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .purple-bar {
            width: 4px;
            height: 20px;
            background-color: #8e44ad;
            margin-right: 10px;
        }

        .header-title h3 {
            margin: 0;
            font-size: 16px;
            color: #333;
        }

        .card {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .card h2 {
            color: #8e44ad;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 20px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            color: #333;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #555;
            font-weight: normal;
        }

        .radio-label input {
            margin-right: 6px;
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-submit {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-cancel {
            background-color: #e0e0e0;
            color: #333;
        }
        
        .btn:hover {
            background-color: #d0d0d0;
        }
        </style>
    </head>
    
    <body>
        <div class="container">
            <div class="header-title">
                <div class="purple-bar"></div>
                <h3>Use JSP Scriptlet and JSP Expression in Application</h3>
            </div>

            <div class="card">
                <h2>Customer Discount</h2>

                <form action="processCustomer.jsp" method="POST">

                    <div class="form-group">
                        <label for="customerCode">Customer Code</label>
                        <input type="text" id="customerCode" name="customerCode" class="form-control" placeholder="Key-in customer code">
                    </div>

                    <div class="form-group">
                        <label for="quantity">Quantity</label>
                        <input type="number" id="quantity" name="quantity" class="form-control" placeholder="Key-in quantity" min="1">
                    </div>

                    <div class="form-group">
                        <label>Customer Type</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="customerType" value="1" checked> Normal Customer
                            </label>

                            <label class="radio-label">
                                <input type="radio" name="customerType" value="2"> Privilege Customer
                            </label>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-submit">Submit</button>
                        <button type="reset" class="btn btn-cancel">Cancel</button>
                    </div>

                </form>
            </div>
        </div>
    </body>
</html>
