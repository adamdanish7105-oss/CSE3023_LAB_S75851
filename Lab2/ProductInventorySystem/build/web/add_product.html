<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        form { width: 300px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        label { display: inline-block; width: 80px; }
        input, select { margin-bottom: 10px; padding: 5px; width: 180px; }
        input[type="submit"] { width: 100px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #45a049; }
        a { display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Add New Product</h2>
    <form action="InsertProductServlet" method="POST">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br>

        <label for="category">Category:</label>
        <select id="category" name="category">
            <option value="Electronics">Electronics</option>
            <option value="Stationery">Stationery</option>
            <option value="Furniture">Furniture</option>
            <option value="Clothing">Clothing</option>
        </select><br>

        <label for="price">Price (RM):</label>
        <input type="number" id="price" name="price" step="0.01" required><br>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" name="quantity" required><br><br>

        <input type="submit" value="Add Product">
    </form>
    <br>
    <a href="ViewProductServlet">View All Products</a>
</body>
</html>
